name: Parallax CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run demo (smoke test)
        run: |
          echo "1" | timeout 15 python main.py || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/models.py
          python -m py_compile src/memory.py
          python -m py_compile src/message_bus.py
          python -m py_compile src/orchestrator.py
          python -m py_compile src/api.py
          python -m py_compile src/copilots/base.py
          python -m py_compile src/copilots/agents.py
          python -m py_compile src/copilots/catalyst.py
